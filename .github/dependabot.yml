version: 2

# Grouping strategy
# -----------------
# minor + patch updates are grouped into a single PR per ecosystem (low risk,
# keeps noise down). MAJOR updates are deliberately NOT grouped: each major gets
# its own isolated PR so a breaking major (e.g. tailwindcss v4, eslint v10) can
# be reviewed/merged/reverted on its own instead of taking down the whole batch.
updates:
  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "daily"
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "abelxmendoza"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/apps/server"
    schedule:
      interval: "daily"
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "abelxmendoza"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
