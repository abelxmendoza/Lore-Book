name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  HUSKY: '0'
  CYPRESS_INSTALL_BINARY: '0'

jobs:
  verify:
    name: Verify Production Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/server/package-lock.json
            apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Redux state-management tests (slices, RTK Query, adapters, event bridge)
        working-directory: apps/web
        run: npm run test:unit -- src/store

      - name: Build web production bundle
        working-directory: apps/web
        run: npm run build

      - name: Validate web build output
        working-directory: apps/web
        run: npm run test:build

      - name: Validate web chunk dependencies
        working-directory: apps/web
        run: npm run test:chunk-deps

      - name: Build backend container
        run: docker build --file apps/server/Dockerfile --tag lorekeeper-server-release apps/server

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [verify]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel_secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is missing. Skipping Vercel deploy."
          fi

      - name: Setup Node.js
        if: steps.vercel_secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        if: steps.vercel_secrets.outputs.configured == 'true'
        run: npm install --global vercel@39.3.0

      - name: Pull Vercel environment
        if: steps.vercel_secrets.outputs.configured == 'true'
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel artifact
        if: steps.vercel_secrets.outputs.configured == 'true'
        working-directory: apps/web
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy Vercel artifact
        if: steps.vercel_secrets.outputs.configured == 'true'
        working-directory: apps/web
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  post-deploy-health:
    name: Post-Deploy Health Gate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [deploy-web]
    env:
      # Override via repo/environment variables if the URLs change.
      BACKEND_URL: ${{ vars.BACKEND_HEALTH_URL || 'https://lore-book-production.up.railway.app' }}
      FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || 'https://lorebookai.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Railway redeploys from git on the same push; give it time to come up,
      # then assert the edge actually serves 200 with correct CORS. This is the
      # gate that would have caught the 2026-06-18 port-mismatch 502.
      - name: Backend /api/health smoke check
        run: >-
          node scripts/smoke-health.mjs "$BACKEND_URL"
          --origin "$FRONTEND_ORIGIN"
          --attempts 30 --interval-ms 10000 --timeout-ms 10000

      - name: Frontend reachability smoke check
        run: >-
          node scripts/smoke-health.mjs "$FRONTEND_ORIGIN"
          --attempts 10 --interval-ms 6000 --timeout-ms 10000
        continue-on-error: true
