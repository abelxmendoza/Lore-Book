name: Code Quality Report

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  HUSKY: '0'
  CYPRESS_INSTALL_BINARY: '0'

jobs:
  lint-report:
    name: Lint Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/server/package-lock.json
            apps/web/package-lock.json

      - name: Install server dependencies
        working-directory: apps/server
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Server lint report
        working-directory: apps/server
        run: npm run lint
        continue-on-error: true

      - name: Web lint report
        working-directory: apps/web
        run: npm run lint
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Code Quality Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Lint is report-only because the current repository baseline has existing lint errors." >> "$GITHUB_STEP_SUMMARY"
          echo "Move this workflow back to pull_request once the lint baseline is clean." >> "$GITHUB_STEP_SUMMARY"
