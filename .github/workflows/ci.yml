name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  HUSKY: '0'
  CYPRESS_INSTALL_BINARY: '0'

jobs:
  quality-baseline:
    name: Quality Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/server/package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install server dependencies
        working-directory: apps/server
        run: npm ci --ignore-scripts

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: npm audit (server)
        working-directory: apps/server
        run: npm audit --audit-level=high

      - name: npm audit (web)
        working-directory: apps/web
        run: npm audit --audit-level=high

      - name: Founder privacy guard
        run: npm run check:founder-privacy

      - name: Demo privacy guard
        run: npm run check:demo-privacy

      - name: TypeScript baseline report
        run: npm run check:types
        continue-on-error: true

      - name: TypeScript baseline note
        if: always()
        run: |
          echo "TypeScript baseline is report-only until the existing repository-wide baseline is reconciled." >> "$GITHUB_STEP_SUMMARY"
          echo "Do not add it to required checks until npm run check:types passes locally." >> "$GITHUB_STEP_SUMMARY"

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: test-openai-key
      STRIPE_SECRET_KEY: sk_test_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/server/package-lock.json

      - name: Install dependencies
        working-directory: apps/server
        run: npm ci

      - name: Run backend test suite
        working-directory: apps/server
        run: npm test

  backend-regression-tests:
    name: Backend Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: test-openai-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/server/package-lock.json

      - name: Install dependencies
        working-directory: apps/server
        run: npm ci

      - name: Engine dependency schema/cache regressions
        working-directory: apps/server
        run: npm test -- src/services/engineRegistry/dependencyGraph.test.ts tests/db/schemaVerification.test.ts tests/db/engineDependenciesMigration.test.ts

      - name: Networking/health regressions (502 + CORS outage guard)
        working-directory: apps/server
        run: npm test -- tests/config/serverPort.test.ts tests/utils/corsPolicy.test.ts tests/routes/health.test.ts tests/integration/serverNetworking.test.ts

      - name: Ingestion pipeline regressions (unit + integration + e2e)
        working-directory: apps/server
        run: npm test -- tests/services/extractionSignals.test.ts tests/utils/aiUncertainty.test.ts tests/services/ingestionPipeline.test.ts tests/integration/ingestionPipelineE2E.test.ts

      - name: Egress guard regressions (projection + ingestion dedup + single-pass reuse)
        working-directory: apps/server
        run: npm run test:egress

      - name: Script consolidation regressions (migration runner / backfill / cleanup)
        working-directory: apps/server
        run: npm run test:scripts

      - name: Audit suite regressions (dispatcher + shared helpers)
        working-directory: apps/server
        run: npm run test:audits

      - name: Phase 1 redirect regressions (timeline v2 + people_places reads)
        working-directory: apps/server
        run: npm run test:phase1

      - name: Ontology/kinship consolidation regressions (unit + integration + e2e)
        working-directory: apps/server
        run: npm run test:kinship

      - name: Stance & affect lexical regressions (preference like/dislike)
        working-directory: apps/server
        run: npm run test:stance

      - name: Lexical extension regressions (temporal, social, discourse)
        working-directory: apps/server
        run: npm run test:lexical

      - name: Lore agents regressions (unit + integration + routing)
        working-directory: apps/server
        run: npm run test:lore-agents

      - name: System cognition regressions (self-model, intent matrix, migration, wiring)
        working-directory: apps/server
        run: npm run test:system-cognition

      - name: Composer entity chip regressions (matching, validation, chat integration)
        working-directory: apps/server
        run: npm run test:composer-chips

      - name: MRQ claim governance regressions
        working-directory: apps/server
        run: npm run test:governance

      - name: Temporal consolidation regressions
        working-directory: apps/server
        run: npm run test:temporal

      - name: Narrative cognition regressions (unit + integration + e2e)
        working-directory: apps/server
        run: npm run test:narrative-cognition

  web-regression-tests:
    name: Web Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Backend health and mock-data regressions
        working-directory: apps/web
        run: npm run test:unit -- src/lib/backendHealth.test.ts src/contexts/MockDataContext.test.tsx

      - name: Redux state-management tests (slices, RTK Query, adapters, event bridge)
        working-directory: apps/web
        run: npm run test:unit -- src/store

      - name: Composer entity chip regressions (matching, redux, typing UX)
        working-directory: apps/web
        run: npm run test:composer-chips

      - name: Cognition API client regressions
        working-directory: apps/web
        run: npm run test:unit -- src/api/cognition.test.ts

      - name: Route security regressions (auth + role gates)
        working-directory: apps/web
        run: npm run test:unit -- src/components/RouteGuard.test.tsx src/middleware/routeAccess.test.ts src/pages/Router.integration.test.tsx

      - name: Admin shell regressions (early access notice)
        working-directory: apps/web
        run: npm run test:unit -- src/components/DevelopmentNotice.test.tsx

      - name: Demo privacy guard
        working-directory: apps/web
        run: npm run test:demo-privacy

  web-production-build:
    name: Web Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [web-regression-tests]
    env:
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        working-directory: apps/web
        run: npm run build

      - name: Validate build output
        working-directory: apps/web
        run: npm run test:build

      - name: Validate chunk dependencies
        working-directory: apps/web
        run: npm run test:chunk-deps

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7
          if-no-files-found: error

  server-container-build:
    name: Server Container Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [server-tests, backend-regression-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Railway server image
        run: docker build --file apps/server/Dockerfile --tag lorekeeper-server-ci apps/server

  e2e-redux-smoke:
    name: E2E Redux Smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web-production-build]
    # Advisory: not part of the required ci-pass gate yet, so e2e flakiness does
    # not block merges. Promote to ci-pass once it proves stable.
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Install Playwright chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Redux e2e smoke
        working-directory: apps/web
        run: npx playwright test e2e/redux-state.spec.ts --project=chromium

  e2e-composer-chips-smoke:
    name: E2E Composer Chips Smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web-production-build]
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Install Playwright chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run composer chips e2e smoke
        working-directory: apps/web
        run: npx playwright test e2e/chat-composer-chips.spec.ts --project=chromium

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      - quality-baseline
      - server-tests
      - backend-regression-tests
      - web-regression-tests
      - web-production-build
      - server-container-build
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          if [ "${{ needs.quality-baseline.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.server-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.backend-regression-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.web-regression-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.web-production-build.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.server-container-build.result }}" != "success" ]; then exit 1; fi

          echo "All required CI checks passed." >> "$GITHUB_STEP_SUMMARY"
